StylesPath = .vale/styles
Packages = Google, proselint, write-good, alex
MinAlertLevel = suggestion
Vocab = spp


[*.{md}]
BasedOnStyles = Vale, Google, proselint, write-good, alex

# E-Prime bans every form of "to be". That is a novelty writing constraint and
# it is unusable for a language specification, where definitional sentences
# ("the generator type is defined as...") are the norm.
write-good.E-Prime = NO

# Google.Passive reports the same findings; keeping both doubles every alert.
write-good.Passive = NO

# Fights sentence-case headings: a term capitalised at the start of a heading
# is taken as the canonical casing, flagging every lowercase use in prose.
Vale.Terms = NO

# Fires on domain acronyms that the audience for a language spec already knows
# (LLVM, STL, FFI, VCS, MTE), and on S++ keywords written in caps in headings.
Google.Acronyms = NO

# The alex rules below only ever match compiler vocabulary used in its technical
# sense: "invalid" (malformed input), "primitive" (primitive type), "destroy",
# "execute", "remains". The inclusive-language rules that carry real signal --
# Gendered, LGBTQ, Condescending, Suicide, OCD -- stay enabled.
alex.Ablist = NO
alex.ProfanityUnlikely = NO
alex.Race = NO
