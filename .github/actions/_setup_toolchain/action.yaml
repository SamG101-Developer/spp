name: setup-toolchain

inputs:
  compiler:
    required: true
  version:
    required: false
    default: ""
  cache-key-suffix:
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install CMake & Ninja
      # Runner images ship an older CMake (3.31.x); pin to satisfy
      # cmake_minimum_required(VERSION 4.1.2) in CMakeLists.txt.
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: "4.1.2"
        ninjaVersion: "latest"

    - name: Install GCC (Linux)
      if: inputs.compiler == 'gcc'
      shell: bash
      run: |
        # gcc-15/16 aren't in the base noble repos; the toolchain PPA provides
        # them (and their libstdc++ ships libstdc++.modules.json for `import std`).
        sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
        sudo apt-get update
        # g++-N does not pull in the gcc-N C driver, so install both explicitly.
        sudo apt-get install -y "gcc-${{ inputs.version }}" "g++-${{ inputs.version }}" ccache
        echo "CC=gcc-${{ inputs.version }}"  >> "$GITHUB_ENV"
        echo "CXX=g++-${{ inputs.version }}" >> "$GITHUB_ENV"

    - name: Install Clang (Linux)
      if: inputs.compiler == 'clang'
      shell: bash
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh "${{ inputs.version }}"
        sudo apt-get install -y ccache
        echo "CC=clang-${{ inputs.version }}"    >> "$GITHUB_ENV"
        echo "CXX=clang++-${{ inputs.version }}" >> "$GITHUB_ENV"

    - name: Install ccache (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: brew install ccache ninja

    - name: Set up MSVC / clang-cl (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1
    - name: Install sccache (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install sccache -y
        # Point sccache at the same directory the cache step restores (~/.cache/sccache).
        Add-Content -Path $env:GITHUB_ENV -Value "SCCACHE_DIR=$env:USERPROFILE\.cache\sccache"

    - name: Bound compiler-cache size
      shell: bash
      run: |
        if [ "$RUNNER_OS" = "Windows" ]; then
          echo "SCCACHE_CACHE_SIZE=500M" >> "$GITHUB_ENV"
        else
          echo "CCACHE_MAXSIZE=500M"  >> "$GITHUB_ENV"
          echo "CCACHE_COMPRESS=true" >> "$GITHUB_ENV"
        fi

    - name: Restore compiler cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.ccache
          ~/.cache/sccache
        key: cc-${{ runner.os }}-${{ inputs.compiler }}-${{ inputs.version }}-${{ inputs.cache-key-suffix }}-${{ github.sha }}
        restore-keys: |
          cc-${{ runner.os }}-${{ inputs.compiler }}-${{ inputs.version }}-${{ inputs.cache-key-suffix }}-

    # ---- Project dependencies (Linux) --------------------------------------
    # Boost and LLVM are the awkward two to build, so both come prebuilt.
    - name: Install Boost 1.91 (prebuilt download)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        url="https://github.com/MarkusJx/prebuilt-boost/releases/download/1.91.0/boost-1.91.0-ubuntu-24.04-gcc-static%2Bshared-x86.tar.gz"
        curl -fL -o /tmp/boost.tar.gz "$url"
        tar xf /tmp/boost.tar.gz -C "$HOME"   # extracts to $HOME/boost
        echo "BOOST_ROOT=$HOME/boost" >> "$GITHUB_ENV"

    - name: Install LLVM 22 dev libraries (prebuilt, apt.llvm.org)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        wget -q https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 22
        sudo apt-get install -y llvm-22-dev

    # The remaining libraries are header/CMake projects: clone + install, cached.
    # Bump the trailing token in `key` to force a rebuild.
    - name: Cache small libraries (Linux)
      if: runner.os == 'Linux'
      id: libs-cache
      uses: actions/cache@v4
      with:
        path: ~/.local
        key: spp-libs-${{ runner.os }}-v4

    - name: Clone & install small libraries (Linux, cache miss)
      if: runner.os == 'Linux' && steps.libs-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        PREFIX="$HOME/.local"
        mkdir -p "$PREFIX" /tmp/libs
        cd /tmp/libs

        # So each lib can find the ones installed before it (and Boost/LLVM).
        export CMAKE_PREFIX_PATH="$PREFIX${BOOST_ROOT:+:$BOOST_ROOT}:/usr/lib/llvm-22"

        cmake_install() {
          local url="$1"; shift
          local name; name="$(basename "$url" .git)"
          git clone --depth 1 "$url" "$name"
          cmake -S "$name" -B "$name/build" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DBUILD_TESTING=OFF "$@"
          cmake --build "$name/build" --target install
        }

        cmake_install https://github.com/martinus/unordered_dense.git
        cmake_install https://github.com/nlohmann/json.git      -DJSON_BuildTests=OFF
        cmake_install https://github.com/marzer/tomlplusplus.git
        cmake_install https://github.com/Neargye/magic_enum.git -DMAGIC_ENUM_OPT_BUILD_TESTS=OFF -DMAGIC_ENUM_OPT_BUILD_EXAMPLES=OFF
        cmake_install https://github.com/CLIUtils/CLI11.git     -DCLI11_BUILD_TESTS=OFF -DCLI11_BUILD_EXAMPLES=OFF
        cmake_install https://github.com/SamG101-Developer/googletest.git
        cmake_install https://github.com/google/benchmark.git   -DBENCHMARK_ENABLE_TESTING=OFF
        cmake_install https://github.com/ericniebler/range-v3.git -DRANGE_V3_TESTS=OFF -DRANGE_V3_EXAMPLES=OFF -DRANGE_V3_DOCS=OFF
        cmake_install https://github.com/SamG101-Developer/ColEx.git
        cmake_install https://github.com/SamG101-Developer/OpEx.git
        cmake_install https://github.com/SamG101-Developer/GenEx.git

    - name: Expose dependency prefixes (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        echo "CMAKE_PREFIX_PATH=$HOME/.local:/usr/lib/llvm-22:${BOOST_ROOT}${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}" >> "$GITHUB_ENV"
