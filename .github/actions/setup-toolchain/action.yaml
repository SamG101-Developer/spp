name: setup-toolchain
description: >-
  Install the build toolchain for the current runner: compiler, CMake, Ninja,
  compiler cache and the project's dependencies.

inputs:
  compiler:
    description: "Compiler family to install: gcc, clang, msvc or clang-cl."
    required: true
  version:
    description: "Major version of the compiler; empty means the runner default."
    required: false
    default: ""
  compiler-cache:
    description: >-
      Install and restore ccache/sccache. Set to 'false' for CodeQL: a cache hit skips the real
      compiler, so the extractor never sees the translation unit and the database comes out
      incomplete - a green scan over code that was never analysed.
    required: false
    default: "true"
  cache-key-suffix:
    description: "Extra text folded into the compiler-cache key, so variants (sanitizers, ...) do not share a cache."
    required: false
    default: ""
  dependencies:
    description: "Install the project's third-party dependencies. Set to 'false' for jobs that never configure CMake."
    required: false
    default: "true"

runs:
  using: composite
  steps:
    # Runner images ship an older CMake (3.31.x); the project needs 4.1.2 to satisfy
    # cmake_minimum_required() in CMakeLists.txt.
    - name: Install CMake & Ninja
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: "4.1.2"
        ninjaVersion: "latest"

    # Compiler
    - name: Fetch llvm.sh (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        curl -fsSL -o "${RUNNER_TEMP}/llvm.sh" https://apt.llvm.org/llvm.sh
        chmod +x "${RUNNER_TEMP}/llvm.sh"

    - name: Install GCC (Linux)
      if: inputs.compiler == 'gcc'
      shell: bash
      env:
        GCC_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
        sudo apt-get update
        sudo apt-get install -y "gcc-${GCC_VERSION}" "g++-${GCC_VERSION}"
        echo "CC=gcc-${GCC_VERSION}" >> "$GITHUB_ENV"
        echo "CXX=g++-${GCC_VERSION}" >> "$GITHUB_ENV"

    - name: Install Clang (Linux)
      if: inputs.compiler == 'clang'
      shell: bash
      env:
        CLANG_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        sudo "${RUNNER_TEMP}/llvm.sh" "${CLANG_VERSION}"
        echo "CC=clang-${CLANG_VERSION}" >> "$GITHUB_ENV"
        echo "CXX=clang++-${CLANG_VERSION}" >> "$GITHUB_ENV"

    - name: Set up MSVC / clang-cl (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756

    # ---- Compiler cache ----------------------------------------------------
    # Note this buys much less than it looks like it should: ccache does not
    # understand C++20 named modules. The cached *build tree* is what makes
    # CI incremental; this is a second line of defence for the plain translation
    # units and for runs where the tree cache misses.
    - name: Install compiler cache
      if: inputs.compiler-cache == 'true'
      shell: bash
      run: |
        set -euo pipefail
        case "$RUNNER_OS" in
          Linux)   sudo apt-get install -y ccache ;;
          macOS)   brew install ccache ninja ;;
          Windows) choco install sccache -y ;;
        esac

    - name: Configure compiler cache
      if: inputs.compiler-cache == 'true'
      shell: bash
      run: |
        set -euo pipefail
        if [ "$RUNNER_OS" = "Windows" ]; then
          # Point sccache at the directory the cache step below restores.
          echo "SCCACHE_DIR=${USERPROFILE}\\.cache\\sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_CACHE_SIZE=500M" >> "$GITHUB_ENV"
        else
          echo "CCACHE_MAXSIZE=500M" >> "$GITHUB_ENV"
          echo "CCACHE_COMPRESS=true" >> "$GITHUB_ENV"
        fi

    - name: Restore compiler cache
      if: inputs.compiler-cache == 'true'
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: |
          ~/.ccache
          ~/.cache/sccache
        key: cc-${{ runner.os }}-${{ inputs.compiler }}-${{ inputs.version }}-${{ inputs.cache-key-suffix }}-${{ github.sha }}
        restore-keys: |
          cc-${{ runner.os }}-${{ inputs.compiler }}-${{ inputs.version }}-${{ inputs.cache-key-suffix }}-

    - name: Disable compiler cache
      if: inputs.compiler-cache != 'true'
      shell: bash
      run: |
        echo "CCACHE_DISABLE=1" >> "$GITHUB_ENV"
        echo "SPP_NO_COMPILER_LAUNCHER=1" >> "$GITHUB_ENV"

    # Project dependencies (Linux)
    # Boost and LLVM are the awkward two to build, so both come prebuilt.
    - name: Install Boost 1.91 (prebuilt)
      if: inputs.dependencies == 'true' && runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        url="https://github.com/MarkusJx/prebuilt-boost/releases/download/1.91.0/boost-1.91.0-ubuntu-24.04-gcc-static%2Bshared-x86.tar.gz"
        curl -fL -o "${RUNNER_TEMP}/boost.tar.gz" "$url"
        tar xf "${RUNNER_TEMP}/boost.tar.gz" -C "$HOME"   # extracts to $HOME/boost
        echo "BOOST_ROOT=$HOME/boost" >> "$GITHUB_ENV"

    - name: Install LLVM dev libraries (prebuilt, apt.llvm.org)
      if: inputs.dependencies == 'true' && runner.os == 'Linux'
      shell: bash
      env:
        LLVM_LIB_VERSION: "22"
      run: |
        set -euo pipefail
        # Already installed if this job's compiler *is* this LLVM release.
        if ! [ -d "/usr/lib/llvm-${LLVM_LIB_VERSION}" ]; then
          sudo "${RUNNER_TEMP}/llvm.sh" "${LLVM_LIB_VERSION}"
        fi
        sudo apt-get install -y "llvm-${LLVM_LIB_VERSION}-dev"

    # The remaining libraries are header/CMake projects: clone, install, cache.
    # Bump the trailing token in `key` to force a rebuild.
    - name: Cache small libraries (Linux)
      if: inputs.dependencies == 'true' && runner.os == 'Linux'
      id: libs-cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: ~/.local
        key: spp-libs-${{ runner.os }}-v5

    - name: Clone & install small libraries (Linux, cache miss)
      if: inputs.dependencies == 'true' && runner.os == 'Linux' && steps.libs-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        LLVM_LIB_VERSION: "22"
      run: |
        set -euo pipefail
        PREFIX="$HOME/.local"
        mkdir -p "$PREFIX" /tmp/libs
        cd /tmp/libs

        # So each library can find the ones installed before it (and Boost/LLVM).
        export CMAKE_PREFIX_PATH="$PREFIX${BOOST_ROOT:+:$BOOST_ROOT}:/usr/lib/llvm-${LLVM_LIB_VERSION}"

        cmake_install() {
          local url="$1"; shift
          local name; name="$(basename "$url" .git)"
          git clone --depth 1 "$url" "$name"
          cmake -S "$name" -B "$name/build" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DBUILD_TESTING=OFF "$@"
          cmake --build "$name/build" --target install
        }

        cmake_install https://github.com/martinus/unordered_dense.git
        cmake_install https://github.com/nlohmann/json.git        -DJSON_BuildTests=OFF
        cmake_install https://github.com/marzer/tomlplusplus.git
        cmake_install https://github.com/Neargye/magic_enum.git   -DMAGIC_ENUM_OPT_BUILD_TESTS=OFF -DMAGIC_ENUM_OPT_BUILD_EXAMPLES=OFF
        cmake_install https://github.com/CLIUtils/CLI11.git       -DCLI11_BUILD_TESTS=OFF -DCLI11_BUILD_EXAMPLES=OFF
        cmake_install https://github.com/SamG101-Developer/googletest.git
        cmake_install https://github.com/google/benchmark.git     -DBENCHMARK_ENABLE_TESTING=OFF
        cmake_install https://github.com/ericniebler/range-v3.git -DRANGE_V3_TESTS=OFF -DRANGE_V3_EXAMPLES=OFF -DRANGE_V3_DOCS=OFF
        cmake_install https://github.com/SamG101-Developer/ColEx.git
        cmake_install https://github.com/SamG101-Developer/OpEx.git
        cmake_install https://github.com/SamG101-Developer/GenEx.git

    - name: Expose dependency prefixes (Linux)
      if: inputs.dependencies == 'true' && runner.os == 'Linux'
      shell: bash
      env:
        LLVM_LIB_VERSION: "22"
      run: |
        echo "CMAKE_PREFIX_PATH=$HOME/.local:/usr/lib/llvm-${LLVM_LIB_VERSION}:${BOOST_ROOT}${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}" >> "$GITHUB_ENV"
