name: setup-toolchain
description: >-
  Install the build toolchain for the current runner: compiler, CMake, Ninja,
  compiler cache and the project's dependencies.

inputs:
  compiler:
    description: "Compiler family to install: gcc, clang, msvc or clang-cl."
    required: true
  version:
    description: "Major version of the compiler; empty means the runner default."
    required: false
    default: ""
  compiler-cache:
    description: >-
      Install and restore ccache/sccache. Set to 'false' for CodeQL: a cache hit skips the real
      compiler, so the extractor never sees the translation unit and the database comes out
      incomplete - a green scan over code that was never analysed.
    required: false
    default: "true"
  cache-key-suffix:
    description: "Extra text folded into the compiler-cache key, so variants (sanitizers, ...) do not share a cache."
    required: false
    default: ""
  dependencies:
    description: "Install the project's third-party dependencies. Set to 'false' for jobs that never configure CMake."
    required: false
    default: "true"

runs:
  using: composite
  steps:
    # Cache-key versions and toolchain pins all live in .github/versions.env.
    - name: Load pinned versions
      shell: bash
      run: grep -E '^[A-Za-z_]+=' .github/versions.env >> "$GITHUB_ENV"

    # Runner images ship an older CMake (3.31.x); the project needs 4.1.2 to satisfy
    # cmake_minimum_required() in CMakeLists.txt.
    - name: Install CMake & Ninja
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: "4.1.2"
        ninjaVersion: "latest"

    # Compiler
    # Linux + GCC
    - name: Fetch llvm.sh (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        curl -fsSL -o "${RUNNER_TEMP}/llvm.sh" https://apt.llvm.org/llvm.sh
        chmod +x "${RUNNER_TEMP}/llvm.sh"

    - name: Install GCC (Linux)
      if: inputs.compiler == 'gcc' && runner.os == 'Linux'
      shell: bash
      env:
        GCC_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
        sudo apt-get update
        sudo apt-get install -y "gcc-${GCC_VERSION}" "g++-${GCC_VERSION}"
        echo "CC=gcc-${GCC_VERSION}" >> "$GITHUB_ENV"
        echo "CXX=g++-${GCC_VERSION}" >> "$GITHUB_ENV"

    # Linux + Clang
    - name: Install Clang (Linux)
      if: inputs.compiler == 'clang' && runner.os == 'Linux'
      shell: bash
      env:
        CLANG_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        sudo "${RUNNER_TEMP}/llvm.sh" "${CLANG_VERSION}"
        sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
        sudo apt-get update
        sudo apt-get install -y "g++-${LIBSTDCXX_GCC_VERSION}"
        echo "CC=clang-${CLANG_VERSION}" >> "$GITHUB_ENV"
        echo "CXX=clang++-${CLANG_VERSION}" >> "$GITHUB_ENV"

    # macOS + Clang
    - name: Install Clang (macOS, brew)
      if: inputs.compiler == 'clang' && runner.os == 'macOS'
      shell: bash
      env:
        CLANG_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        formula="llvm${CLANG_VERSION:+@${CLANG_VERSION}}"
        brew install "$formula"
        prefix="$(brew --prefix "$formula")"
        echo "CC=${prefix}/bin/clang" >> "$GITHUB_ENV"
        echo "CXX=${prefix}/bin/clang++" >> "$GITHUB_ENV"
        echo "LDFLAGS=-L${prefix}/lib/c++ -Wl,-rpath,${prefix}/lib/c++" >> "$GITHUB_ENV"
        echo "LLVM_PREFIX=${prefix}" >> "$GITHUB_ENV"
        resource_dir="$("${prefix}/bin/clang" -print-resource-dir)"
        sed "s|\"\.\./\.\./|\"${prefix}/|g" \
          "${prefix}/lib/c++/libc++.modules.json" > "${resource_dir}/libc++.modules.json"

    # Windows + Clang-Cl
    - name: Set up MSVC / clang-cl (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756

    - name: Select Windows compiler
      if: runner.os == 'Windows'
      shell: bash
      env:
        COMPILER: ${{ inputs.compiler }}
      run: |
        set -euo pipefail
        cc=cl; [ "$COMPILER" = "clang-cl" ] && cc=clang-cl
        echo "CC=$cc" >> "$GITHUB_ENV"
        echo "CXX=$cc" >> "$GITHUB_ENV"

    # Small performance gains with ccache.
    - name: Install compiler cache
      if: inputs.compiler-cache == 'true'
      shell: bash
      run: |
        set -euo pipefail
        case "$RUNNER_OS" in
          Linux)   sudo apt-get install -y ccache ;;
          macOS)   brew install ccache ninja ;;
          Windows) choco install sccache -y ;;
        esac

    - name: Configure compiler cache
      if: inputs.compiler-cache == 'true'
      shell: bash
      run: |
        set -euo pipefail
        if [ "$RUNNER_OS" = "Windows" ]; then
          # Point sccache at the directory the cache step below restores.
          echo "SCCACHE_DIR=${USERPROFILE}\\.cache\\sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_CACHE_SIZE=500M" >> "$GITHUB_ENV"
        else
          echo "CCACHE_MAXSIZE=500M" >> "$GITHUB_ENV"
          echo "CCACHE_COMPRESS=true" >> "$GITHUB_ENV"
        fi

    - name: Restore compiler cache
      if: inputs.compiler-cache == 'true'
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: |
          ~/.ccache
          ~/.cache/sccache
        key: cc-${{ runner.os }}-${{ inputs.compiler }}-${{ inputs.version }}-${{ inputs.cache-key-suffix }}-${{ github.sha }}
        restore-keys: |
          cc-${{ runner.os }}-${{ inputs.compiler }}-${{ inputs.version }}-${{ inputs.cache-key-suffix }}-

    - name: Disable compiler cache
      if: inputs.compiler-cache != 'true'
      shell: bash
      run: |
        echo "CCACHE_DISABLE=1" >> "$GITHUB_ENV"
        echo "SPP_NO_COMPILER_LAUNCHER=1" >> "$GITHUB_ENV"

    # Project dependencies
    # Boost and LLVM are the awkward two to build, so both come prebuilt.
    - name: Install Boost 1.91 (prebuilt)
      if: inputs.dependencies == 'true'
      shell: bash
      run: |
        set -euo pipefail
        base="https://github.com/MarkusJx/prebuilt-boost/releases/download/1.91.0"
        if [ "$RUNNER_OS" = "Windows" ]; then
          url="$base/boost-1.91.0-windows-2025-msvc-static-x86.tar.gz"
        elif [ "$RUNNER_OS" = "macOS" ]; then
          url="$base/boost-1.91.0-macos-15-clang-static%2Bshared-aarch64.tar.gz"
        else
          url="$base/boost-1.91.0-ubuntu-24.04-gcc-static%2Bshared-x86.tar.gz"
        fi
        tmp="$RUNNER_TEMP"
        [ "$RUNNER_OS" = "Windows" ] && tmp="$(cygpath -u "$tmp")"
        curl -fL -o "$tmp/boost.tar.gz" "$url"
        tar xf "$tmp/boost.tar.gz" -C "$HOME"   # extracts to $HOME/boost
        if [ "$RUNNER_OS" = "Windows" ]; then
          echo "BOOST_ROOT=$(cygpath -m "$HOME/boost")" >> "$GITHUB_ENV"
        else
          echo "BOOST_ROOT=$HOME/boost" >> "$GITHUB_ENV"
        fi

    - name: Install LLVM dev libraries (prebuilt, apt.llvm.org)
      if: inputs.dependencies == 'true' && runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        # Already installed if this job's compiler *is* this LLVM release.
        if ! [ -d "/usr/lib/llvm-${LLVM_LIB_VERSION}" ]; then
          sudo "${RUNNER_TEMP}/llvm.sh" "${LLVM_LIB_VERSION}"
        fi
        sudo apt-get install -y "llvm-${LLVM_LIB_VERSION}-dev"

    # Windows gets the official clang+llvm release tarball, which ships the
    # static libs and lib/cmake/llvm that find_package(LLVM) needs.
    - name: Cache LLVM dev libraries (Windows)
      if: inputs.dependencies == 'true' && runner.os == 'Windows'
      id: llvm-win-cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: ~/llvm
        key: llvm-win-${{ env.LLVM_LIB_FULL_VERSION }}

    - name: Install LLVM dev libraries (Windows, cache miss)
      if: inputs.dependencies == 'true' && runner.os == 'Windows' && steps.llvm-win-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        url="https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_LIB_FULL_VERSION}/clang+llvm-${LLVM_LIB_FULL_VERSION}-x86_64-pc-windows-msvc.tar.xz"
        tmp="$(cygpath -u "$RUNNER_TEMP")"
        curl -fL -o "$tmp/llvm.tar.xz" "$url"
        mkdir -p "$HOME/llvm"
        tar xf "$tmp/llvm.tar.xz" -C "$HOME/llvm" --strip-components=1

    # The remaining libraries are header/CMake projects: clone, install, cache.
    # Bump SPP_LIBS_CACHE_VERSION in .github/versions.env to force a rebuild.
    - name: Cache small libraries
      if: inputs.dependencies == 'true'
      id: libs-cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: ~/.local
        key: spp-libs-${{ runner.os }}-${{ inputs.compiler }}${{ inputs.version }}-v${{ env.SPP_LIBS_CACHE_VERSION }}

    - name: Clone & install small libraries (cache miss)
      if: inputs.dependencies == 'true' && steps.libs-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        PREFIX="$HOME/.local"
        mkdir -p "$PREFIX" "${RUNNER_TEMP}/libs"
        cd "${RUNNER_TEMP}/libs"

        if [ "$RUNNER_OS" = "Windows" ]; then
          PREFIX="$(cygpath -m "$PREFIX")"
          export CMAKE_PREFIX_PATH="$PREFIX;${BOOST_ROOT};$(cygpath -m "$HOME/llvm")"
        else
          llvm_prefix="${LLVM_PREFIX:-/usr/lib/llvm-${LLVM_LIB_VERSION}}"
          export CMAKE_PREFIX_PATH="$PREFIX${BOOST_ROOT:+:$BOOST_ROOT}:$llvm_prefix"
        fi

        cmake_install() {
          local url="$1"; shift
          local name; name="$(basename "$url" .git)"
          git clone --depth 1 "$url" "$name"
          cmake -S "$name" -B "$name/build" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DBUILD_TESTING=OFF "$@"
          cmake --build "$name/build" --target install
        }

        cmake_install https://github.com/martinus/unordered_dense.git
        cmake_install https://github.com/nlohmann/json.git        -DJSON_BuildTests=OFF
        cmake_install https://github.com/marzer/tomlplusplus.git
        cmake_install https://github.com/Neargye/magic_enum.git   -DMAGIC_ENUM_OPT_BUILD_TESTS=OFF -DMAGIC_ENUM_OPT_BUILD_EXAMPLES=OFF
        cmake_install https://github.com/CLIUtils/CLI11.git       -DCLI11_BUILD_TESTS=OFF -DCLI11_BUILD_EXAMPLES=OFF
        cmake_install https://github.com/SamG101-Developer/googletest.git
        cmake_install https://github.com/google/benchmark.git     -DBENCHMARK_ENABLE_TESTING=OFF
        cmake_install https://github.com/ericniebler/range-v3.git -DRANGE_V3_TESTS=OFF -DRANGE_V3_EXAMPLES=OFF -DRANGE_V3_DOCS=OFF
        cmake_install https://github.com/SamG101-Developer/ColEx.git
        cmake_install https://github.com/SamG101-Developer/OpEx.git
        cmake_install https://github.com/SamG101-Developer/GenEx.git

    - name: Expose dependency prefixes
      if: inputs.dependencies == 'true'
      shell: bash
      run: |
        if [ "$RUNNER_OS" = "Windows" ]; then
          echo "CMAKE_PREFIX_PATH=$(cygpath -m "$HOME/.local");$(cygpath -m "$HOME/llvm");${BOOST_ROOT}" >> "$GITHUB_ENV"
        else
          llvm_prefix="${LLVM_PREFIX:-/usr/lib/llvm-${LLVM_LIB_VERSION}}"
          echo "CMAKE_PREFIX_PATH=$HOME/.local:${llvm_prefix}:${BOOST_ROOT}${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}" >> "$GITHUB_ENV"
        fi
