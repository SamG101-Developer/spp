name: detect-changes
description: "Decide whether this ref changed anything that can affect a build, test or analysis result."

inputs:
  base:
    description: "Commit to diff from. Empty, all-zeroes or unreachable means 'assume everything changed'."
    required: false
    default: ""
  head:
    description: "Commit to diff to."
    required: false
    default: ${{ github.sha }}

outputs:
  code:
    description: "'true' when a compile/test/analysis-affecting path changed."
    value: ${{ steps.filter.outputs.code }}

runs:
  using: composite
  steps:
    - name: Filter changed paths
      id: filter
      shell: bash
      env:
        BASE_SHA: ${{ inputs.base }}
        HEAD_SHA: ${{ inputs.head }}
      run: |
        set -euo pipefail

        # No usable base (manual dispatch, merge queue, new branch, force push to
        # an unknown commit): fall back to building, because we cannot prove it is
        # safe to skip.
        if [ -z "$BASE_SHA" ] \
          || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] \
          || ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
          echo "no usable base commit; assuming code changed"
          echo "code=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
        echo "Changed files:"
        echo "$files"

        # Keep this pattern in step with the directories the build actually reads.
        pattern='^(headers/|sources/|tests/|main\.cpp$|CMakeLists\.txt$'
        pattern+='|\.cppcheck-suppressions$|\.github/(workflows|actions)/)'

        if echo "$files" | grep -qE "$pattern"; then
          echo "code=true" >> "$GITHUB_OUTPUT"
        else
          echo "code=false" >> "$GITHUB_OUTPUT"
        fi
