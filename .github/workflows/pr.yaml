name: PR

# Every job here either detects something cheap or delegates to a `_*.yaml`
# reusable workflow. The shape of the pipeline is readable from the
# `needs:` edges:
#
#   changes ─┐
#   lint ────┴─> cppcheck ─┬─> build-test (release ∥ asan ∥ tsan, fail-fast)
#                          └─> build-test-extra (other toolchains, advisory)
#
#   docs, security, sonar   ─> independent of the chain, started immediately
#
# Claude's review lives in claude_code_review.yaml on its own trigger, so it
# does not interfere with this pipeline

on:
  pull_request:
    types: [ opened, synchronize, reopened, edited ]
  merge_group: { }
  workflow_dispatch: { }

concurrency:
  # One group per PR branch / dispatch ref / merge-queue ref.
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # Skips the expensive jobs on docs-only / config-only changes. A skipped job
  # counts as a pass for ci-success, so branch protection stays satisfied
  # either way.
  changes:
    name: Detect Code Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: ./.github/actions/checkout
        with:
          restore-mtimes: "false"
      - id: filter
        uses: ./.github/actions/detect-changes
        with:
          # Empty outside a pull_request (merge queue, dispatch), which the
          # action reads as "assume everything changed".
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}

  # PR title check and pre-commit, side by side.
  lint:
    name: Lint
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/_lint.yaml

  # Static analysis gates the compilation: no point spending 40 minutes on a
  # build that cppcheck can reject in two.
  cppcheck:
    name: Static Analysis
    needs: [ changes, lint ]
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/_cppcheck.yaml

  # Supported toolchain. "Release" and both "sanitiser" configurations build
  # in parallel and fail-fast, so one broken variant stops the others
  # immediately.
  build-test:
    name: Build & Test
    needs: [ changes, cppcheck ]
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/_compile.yaml
    with:
      os: ubuntu-latest
      compiler: gcc
      version: "16"
      fail-fast: true
      variants: >-
        [
          {"name": "release", "build-type": "Release", "sanitizer": ""},
          {"name": "asan", "build-type": "Debug", "sanitizer": "address+undefined+leak"},
          {"name": "tsan", "build-type": "Debug", "sanitizer": "thread"}
        ]

  # Aspirational toolchains: they run and report red on failure, but are
  # deliberately omitted from ci-success, so they never block a merge.
  build-test-extra:
    name: Build & Test (non-blocking)
    needs: [ changes, cppcheck ]
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, compiler: clang, version: "22" }
          - { os: macos-latest, compiler: clang, version: "" }
          - { os: windows-latest, compiler: msvc, version: "" }
          - { os: windows-latest, compiler: clang-cl, version: "" }
    uses: ./.github/workflows/_compile.yaml
    with:
      os: ${{ matrix.os }}
      compiler: ${{ matrix.compiler }}
      version: ${{ matrix.version }}
      fail-fast: false
      variants: '[{"name": "release", "build-type": "RelWithDebInfo", "sanitizer": ""}]'

  # Independent of the compile chain: doc breakage is worth hearing about
  # even while the build is still running.
  docs:
    name: Docs
    permissions:
      contents: read
    uses: ./.github/workflows/_docs.yaml

  security:
    name: Security
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: ./.github/workflows/_security.yaml

  # Advisory: runs SonarQube Cloud analysis with PR decoration, but is deliberately
  # omitted from ci-success, so a red quality gate does not block a merge. Add it to
  # the ci-success `needs` list to make it blocking.
  sonar:
    name: Sonar
    needs: [ changes ]
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/_sonar.yaml
    secrets: inherit

  # The single required status check for branch protection. Fails if any needed job
  # failed or was cancelled; passes when they all succeeded or were skipped.
  ci-success:
    name: CI Success
    if: ${{ always() }}
    needs: [ changes, lint, cppcheck, build-test, docs, security ]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: { }
    steps:
      - name: Verify all required jobs passed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "One or more required jobs did not succeed:"
          echo '${{ toJSON(needs) }}'
          exit 1
