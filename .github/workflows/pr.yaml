name: PR

on:
  pull_request:
    types: [ opened, synchronize, reopened, edited ]
  merge_group: { }
  workflow_dispatch: { }

concurrency:
  # One group per PR branch / dispatch ref / merge-queue ref.
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  title:
    name: PR Title Format
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: read  # read the PR title to validate its format
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            core
          requireScope: false
          subjectPattern: '^[a-z][a-z0-9 .-]*$'
          subjectPatternError: "The description must match the regex."

  precommit:
    name: Format & Lint (Pre-Commit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.14"
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd

  # Supported toolchain: must pass, gates ci-success.
  build-test:
    name: Build & Test
    needs: [ precommit ]
    permissions:
      contents: read
    uses: ./.github/workflows/_build_and_test.yaml
    with:
      os: ubuntu-latest
      compiler: gcc
      version: "16"

  # Aspirational toolchains: run and report red on failure, but do NOT gate
  # ci-success (it deliberately omits this job from `needs`).
  build-test-extra:
    name: Build & Test (non-blocking)
    needs: [ precommit ]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, compiler: clang, version: "22" }
          - { os: macos-latest, compiler: clang, version: "" }
          - { os: windows-latest, compiler: msvc, version: "" }
          - { os: windows-latest, compiler: clang-cl, version: "" }
    uses: ./.github/workflows/_build_and_test.yaml
    with:
      os: ${{ matrix.os }}
      compiler: ${{ matrix.compiler }}
      version: ${{ matrix.version }}

  sanitizers:
    name: Sanitizers
    needs: [ precommit ]
    permissions:
      contents: read
    uses: ./.github/workflows/_sanitizers.yaml
    with:
      configs: '["address+undefined+leak", "thread"]'

  # Builds the site without publishing it.
  docs:
    name: Docs
    needs: [ precommit ]
    permissions:
      contents: read
    uses: ./.github/workflows/_docs.yaml

  security:
    name: Security
    needs: [ precommit ]
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: ./.github/workflows/_security.yaml

  # Single required status check for branch protection. Fails if any needed job
  # failed or was cancelled; passes when they all succeeded or were skipped.
  ci-success:
    name: CI Success
    if: ${{ always() }}
    needs: [ title, precommit, build-test, sanitizers, security, docs ]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Verify all required jobs passed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "One or more required jobs did not succeed:"
          echo '${{ toJSON(needs) }}'
          exit 1
