name: sanitizers

on:
  workflow_call:
    inputs:
      configs:
        required: true
        type: string
      os:
        required: false
        type: string
        default: "ubuntu-latest"

jobs:
  sanitize:
    name: ${{ matrix.config }}
    runs-on: ${{ inputs.os }}
    timeout-minutes: 120
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(inputs.configs) }}
    env:
      ASAN_OPTIONS: "abort_on_error=1:halt_on_error=1:detect_leaks=1:strict_string_checks=1"
      UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"
      TSAN_OPTIONS: "halt_on_error=1:second_deadlock_stack=1"

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set Up Toolchain
        uses: ./.github/actions/_setup_toolchain
        with:
          compiler: gcc
          version: "16"
          cache-key-suffix: san-${{ matrix.config }}

      - name: Restore Build Tree
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: build
          key: build-san-${{ inputs.os }}-${{ matrix.config }}-${{ github.sha }}
          restore-keys: |
            build-san-${{ inputs.os }}-${{ matrix.config }}-

      - name: Configure (${{ matrix.config }})
        uses: ./.github/actions/_configure_cmake
        with:
          build-type: Debug
          sanitizer: ${{ matrix.config }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test Under ${{ matrix.config }} (gtest-parallel)
        shell: bash
        run: |
          git clone --depth 1 https://github.com/google/gtest-parallel.git /tmp/gtest-parallel
          mkdir -p tests/test_output
          python3 /tmp/gtest-parallel/gtest-parallel \
            ./build/tests/spp_tests \
            --output_dir=tests/test_output

      - name: Upload Sanitizer Logs on Failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: san-${{ matrix.config }}-logs
          path: tests/test_output
          if-no-files-found: ignore

      - name: Save Build Tree
        if: always()
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: build
          key: build-san-${{ inputs.os }}-${{ matrix.config }}-${{ github.sha }}
