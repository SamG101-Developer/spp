name: build-and-test

on:
  workflow_call:
    inputs:
      os:
        description: "Runner image (ubuntu-latest | macos-latest | windows-latest)"
        required: true
        type: string
      compiler:
        description: "Compiler (gcc | clang | msvc | clang-cl)"
        required: true
        type: string
      version:
        description: "Version of the compiler to use"
        required: false
        type: string
        default: ""
      build-type:
        required: false
        type: string
        default: "RelWithDebInfo"
    secrets: { }

permissions:
  contents: read

jobs:
  build-test:
    name: ${{ inputs.os }} · ${{ inputs.compiler }}${{ inputs.version && format('-{0}', inputs.version) || '' }}
    runs-on: ${{ inputs.os }}
    timeout-minutes: 60
    steps:
      - name: Harden runner
        if: runner.os == 'Linux'  # harden-runner only supports Ubuntu runners
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v7
      - name: Set up toolchain
        uses: ./.github/actions/_setup_toolchain
        with:
          compiler: ${{ inputs.compiler }}
          version: ${{ inputs.version }}

      # Restore the CMake build tree so pushes rebuild incrementally (Ninja only
      # recompiles what changed). The sha-keyed entry never hits exactly on a new
      # commit; the prefix restore-keys bring back the most recent tree instead.
      - name: Restore build tree
        uses: actions/cache/restore@v6
        with:
          path: build
          key: build-${{ inputs.os }}-${{ inputs.compiler }}-${{ inputs.version }}-${{ github.sha }}
          restore-keys: |
            build-${{ inputs.os }}-${{ inputs.compiler }}-${{ inputs.version }}-

      - name: Configure
        uses: ./.github/actions/_configure_cmake
        with:
          build-type: ${{ inputs.build-type }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test (gtest-parallel)
        shell: bash
        run: |
          git clone --depth 1 https://github.com/google/gtest-parallel.git /tmp/gtest-parallel
          mkdir -p tests/test_output
          python3 /tmp/gtest-parallel/gtest-parallel \
            ./build/tests/spp_tests \
            --output_dir=tests/test_output

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: testlog-${{ inputs.os }}-${{ inputs.compiler }}${{ inputs.version }}
          path: tests/test_output
          if-no-files-found: ignore

      # Save the build tree even when tests (or the build) fail, so a red run
      # doesn't discard the compiled objects and the next run stays incremental.
      - name: Save build tree
        if: always()
        uses: actions/cache/save@v6
        with:
          path: build
          key: build-${{ inputs.os }}-${{ inputs.compiler }}-${{ inputs.version }}-${{ github.sha }}
