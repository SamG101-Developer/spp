name: build-and-test

on:
  workflow_call:
    inputs:
      os:
        description: "Runner image (ubuntu-latest | macos-latest | windows-latest)"
        required: true
        type: string
      compiler:
        description: "Compiler (gcc | clang | msvc | clang-cl)"
        required: true
        type: string
      version:
        description: "Version of the compiler to use"
        required: false
        type: string
        default: ""
      build-type:
        required: false
        type: string
        default: "RelWithDebInfo"
    secrets: { }

jobs:
  build-test:
    name: ${{ inputs.os }} · ${{ inputs.compiler }}${{ inputs.version && format('-{0}', inputs.version) || '' }}
    runs-on: ${{ inputs.os }}
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      - name: Harden runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Set up toolchain
        uses: ./.github/actions/_setup_toolchain
        with:
          compiler: ${{ inputs.compiler }}
          version: ${{ inputs.version }}

      - name: Restore build tree
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: build
          key: build-${{ inputs.os }}-${{ inputs.compiler }}-${{ inputs.version }}-${{ github.sha }}
          restore-keys: |
            build-${{ inputs.os }}-${{ inputs.compiler }}-${{ inputs.version }}-

      - name: Configure
        uses: ./.github/actions/_configure_cmake
        with:
          build-type: ${{ inputs.build-type }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test (gtest-parallel)
        shell: bash
        run: |
          git clone --depth 1 https://github.com/google/gtest-parallel.git /tmp/gtest-parallel
          mkdir -p tests/test_output
          python3 /tmp/gtest-parallel/gtest-parallel \
            ./build/tests/spp_tests \
            --output_dir=tests/test_output

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: testlog-${{ inputs.os }}-${{ inputs.compiler }}${{ inputs.version }}
          path: tests/test_output
          if-no-files-found: ignore

      - name: Save build tree
        if: always()
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: build
          key: build-${{ inputs.os }}-${{ inputs.compiler }}-${{ inputs.version }}-${{ github.sha }}
