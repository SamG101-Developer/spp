name: Nightly

on:
  schedule:
    - cron: '0 4 * * *'  # 04:00 UTC daily
  workflow_dispatch: { }

concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  security:
    name: Security (Full Scan)
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: ./.github/workflows/_security.yaml
    with:
      full-scan: true
