name: post-merge

# Two jobs of work: publish the site, and rebuild master so its build-tree
# caches are fresh. The second part is important as GitHub only lets a PR
# branch read caches from its own branch and from the base branch, so a
# warm master is what lets a brand-new PR compile incrementally.

on:
  push:
    branches: [ master ]
  workflow_dispatch: { }

concurrency:
  group: post-merge
  cancel-in-progress: false

jobs:
  changes:
    name: Detect Code Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit

      # Full history so the before..sha diff below can be resolved. Nothing is built
      # here, so the mtime pass is not needed.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - id: filter
        uses: ./.github/actions/detect-changes
        with:
          base: ${{ github.event.before }}
          head: ${{ github.sha }}

  docs:
    name: Docs
    permissions:
      contents: read
    uses: ./.github/workflows/_docs.yaml
    with:
      upload-pages-artifact: true

  publish-docs:
    name: Publish Docs
    needs: [ docs ]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write     # deploy the built site
      id-token: write  # the Pages deployment is authenticated with an OIDC token
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128

  # Doubles as the master health check and as the cache warmer. Same variants as the
  # PR pipeline, so every key a PR looks for exists on the base branch.
  build-test:
    name: Build & Test
    needs: [ changes ]
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/_compile.yaml
    with:
      os: ubuntu-latest
      compiler: gcc
      version: "16"
      fail-fast: false
      variants: >-
        [
          {"name": "release", "build-type": "RelWithDebInfo", "sanitizer": ""},
          {"name": "asan", "build-type": "Debug", "sanitizer": "address+undefined+leak"},
          {"name": "tsan", "build-type": "Debug", "sanitizer": "thread"}
        ]

  sonar:
    name: Sonar
    needs: [ changes, build-test ]
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/_sonar.yaml
    secrets: inherit
