name: post-merge
on:
  push:
    branches: [ master ]
  workflow_dispatch: {}

concurrency:
  group: post-merge
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # publish-docs: (TODO)
  warm-cache:
    name: Warm cache
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v7
      - name: Set up toolchain
        uses: ./.github/actions/_setup_toolchain
        with:
          compiler: gcc
          version: "16"

      # Same key as the gcc-16 PR leg, so PRs restore this warm master build tree.
      - name: Restore build tree
        uses: actions/cache/restore@v4
        with:
          path: build
          key: build-ubuntu-latest-gcc-16-${{ github.sha }}
          restore-keys: |
            build-ubuntu-latest-gcc-16-

      - name: Configure
        uses: ./.github/actions/_configure_cmake
      - name: Build (populates cache)
        run: cmake --build build --parallel

      - name: Save build tree
        if: always()
        uses: actions/cache/save@v4
        with:
          path: build
          key: build-ubuntu-latest-gcc-16-${{ github.sha }}
