name: post-merge
on:
  push:
    branches: [ master ]
  workflow_dispatch: {}

concurrency:
  group: post-merge
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # publish-docs: (TODO)
  warm-cache:
    name: Warm cache
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Set up toolchain
        uses: ./.github/actions/_setup_toolchain
        with:
          compiler: gcc
          version: "16"

      - name: Restore build tree
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: build
          key: build-ubuntu-latest-gcc-16-${{ github.sha }}
          restore-keys: |
            build-ubuntu-latest-gcc-16-

      - name: Configure
        uses: ./.github/actions/_configure_cmake
      - name: Build (populates cache)
        run: cmake --build build --parallel

      - name: Save build tree
        if: always()
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: build
          key: build-ubuntu-latest-gcc-16-${{ github.sha }}
